name: Build Kernel

on:
  push:
    branches: [master]
    paths:
      - 'guest_configs/microvm-kernel-ci-x86_64-6.1.config'
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: 'Amazon Linux microVM kernel tag (e.g. microvm-kernel-6.1.164-23.303.amzn2023)'
        required: false
        default: 'microvm-kernel-6.1.164-23.303.amzn2023'

env:
  KERNEL_TAG: ${{ github.event.inputs.kernel_tag || 'microvm-kernel-6.1.164-23.303.amzn2023' }}
  REGISTRY: ghcr.io
  PACKAGE_NAME: ${{ github.repository_owner }}/fc-runner-kernel

permissions:
  contents: read
  packages: write

jobs:
  build-kernel:
    name: Build vmlinux from Amazon Linux kernel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev bc git

      - name: Clone Amazon Linux kernel source
        run: |
          git clone --depth 1 --branch ${KERNEL_TAG} \
            https://github.com/amazonlinux/linux.git linux-amzn

      - name: Apply Firecracker kernel config
        working-directory: linux-amzn
        run: |
          cp $GITHUB_WORKSPACE/guest_configs/microvm-kernel-ci-x86_64-6.1.config .config
          cp .config .config.orig
          make olddefconfig
          # Show any configs that changed (helps debug CI vs local differences)
          diff .config.orig .config || true

      - name: Build vmlinux
        working-directory: linux-amzn
        run: make vmlinux -j$(nproc)

      - name: Verify kernel
        working-directory: linux-amzn
        run: |
          ls -lh vmlinux
          file vmlinux | grep -q "ELF 64-bit" || { echo "ERROR: not a valid ELF binary"; exit 1; }

          # Verify required configs are compiled in
          MISSING=""
          grep -q "CONFIG_SQUASHFS=y" .config || MISSING="$MISSING CONFIG_SQUASHFS"
          grep -q "CONFIG_SQUASHFS_ZSTD=y" .config || MISSING="$MISSING CONFIG_SQUASHFS_ZSTD"
          grep -q "CONFIG_OVERLAY_FS=y" .config || MISSING="$MISSING CONFIG_OVERLAY_FS"
          grep -q "CONFIG_VIRTIO=y" .config || MISSING="$MISSING CONFIG_VIRTIO"
          grep -q "CONFIG_VIRTIO_BLK=y" .config || MISSING="$MISSING CONFIG_VIRTIO_BLK"
          grep -q "CONFIG_VIRTIO_MMIO=y" .config || MISSING="$MISSING CONFIG_VIRTIO_MMIO"
          grep -q "CONFIG_VIRTIO_NET=y" .config || MISSING="$MISSING CONFIG_VIRTIO_NET"
          grep -q "CONFIG_EXT4_FS=y" .config || MISSING="$MISSING CONFIG_EXT4_FS"
          grep -q "CONFIG_VETH=y" .config || MISSING="$MISSING CONFIG_VETH"
          grep -q "CONFIG_BRIDGE=y" .config || MISSING="$MISSING CONFIG_BRIDGE"
          grep -q "CONFIG_IP_NF_IPTABLES=y" .config || MISSING="$MISSING CONFIG_IP_NF_IPTABLES"
          grep -q "CONFIG_IP_NF_NAT=y" .config || MISSING="$MISSING CONFIG_IP_NF_NAT"
          grep -q "CONFIG_ACPI=y" .config || MISSING="$MISSING CONFIG_ACPI"
          grep -q "CONFIG_NETFILTER_XT_MATCH_COMMENT=y" .config || MISSING="$MISSING CONFIG_NETFILTER_XT_MATCH_COMMENT"
          grep -q "CONFIG_NETFILTER_XT_MATCH_MULTIPORT=y" .config || MISSING="$MISSING CONFIG_NETFILTER_XT_MATCH_MULTIPORT"
          grep -q "CONFIG_NETFILTER_XT_MARK=y" .config || MISSING="$MISSING CONFIG_NETFILTER_XT_MARK"
          grep -q "CONFIG_NETFILTER_XT_TARGET_MARK=y" .config || MISSING="$MISSING CONFIG_NETFILTER_XT_TARGET_MARK"

          if [ -n "$MISSING" ]; then
            echo "ERROR: kernel config missing required options:$MISSING"
            exit 1
          fi
          echo "Kernel verified: all required configs present"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push kernel to GHCR as OCI artifact
        run: |
          cd linux-amzn
          COMMIT_SHA="${GITHUB_SHA::7}"
          # Extract kernel version from Amazon tag (e.g. microvm-kernel-6.1.164-23.303.amzn2023 → 6.1.164)
          KVER=$(echo "${KERNEL_TAG}" | sed 's/microvm-kernel-//' | cut -d- -f1)
          TAG="${KVER}-${COMMIT_SHA}"

          # Push as OCI artifact using oras
          curl -sLO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
          tar xzf oras_1.2.2_linux_amd64.tar.gz oras
          chmod +x oras

          ./oras push "${REGISTRY}/${PACKAGE_NAME}:${TAG}" \
            --artifact-type application/vnd.fc-runner.kernel.v1 \
            vmlinux:application/octet-stream

          ./oras push "${REGISTRY}/${PACKAGE_NAME}:latest" \
            --artifact-type application/vnd.fc-runner.kernel.v1 \
            vmlinux:application/octet-stream

          echo "Pushed ${REGISTRY}/${PACKAGE_NAME}:${TAG}"
          echo "Pushed ${REGISTRY}/${PACKAGE_NAME}:latest"

      - name: Upload kernel as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd linux-amzn
          KVER=$(echo "${KERNEL_TAG}" | sed 's/microvm-kernel-//' | cut -d- -f1)
          cp vmlinux "vmlinux-${KVER}"

          # Upload to latest release if one exists, otherwise just artifact
          LATEST_RELEASE=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -n "$LATEST_RELEASE" ]; then
            # Delete old kernel asset if present, then upload new one
            gh release delete-asset "$LATEST_RELEASE" "vmlinux-${KVER}" --yes 2>/dev/null || true
            gh release upload "$LATEST_RELEASE" "vmlinux-${KVER}" --clobber
            echo "Uploaded vmlinux-${KVER} to release $LATEST_RELEASE"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: linux-amzn/vmlinux
          retention-days: 90
